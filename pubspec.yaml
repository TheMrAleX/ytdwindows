name: ytdlinux
description: "Descargador de YouTube para Linux con yt-dlp."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  app_links: ^6.4.1
  cached_network_image: ^3.4.1
  file_picker: ^10.1.2
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
