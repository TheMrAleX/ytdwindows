name: Windows Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - run: flutter pub get

      - name: Build Windows (release, no console)
        run: flutter build windows --release

      - name: Bundle yt-dlp + ffmpeg
        shell: pwsh
        run: |
          $out = "build/windows/x64/runner/Release"
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "$out/yt-dlp.exe"
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $bin = Get-ChildItem ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $bin.FullName "$out/ffmpeg.exe"

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ytdlinux-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ytdlinux-windows
          path: ytdlinux-windows.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ytdlinux-windows.zip
